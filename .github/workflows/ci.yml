name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: neca2

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: neca2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript compilation)
        run: npx tsc --noEmit
        continue-on-error: true  # 初期阶段允许 lint 失败

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist
        run: node dist/index.js --version 2>&1 || node -e "require('./dist/index.js')" 2>&1 || echo "Server loaded (expected no --version flag)"

      - name: Check dist artifacts
        run: ls -la dist/ && echo "---" && ls -la dist/protocol/ && echo "---" && ls -la dist/relay/
